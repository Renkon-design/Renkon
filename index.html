<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taeheon JLPT</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffe8f2 0, transparent 26%),
        radial-gradient(circle at top right, #fff0d2 0, transparent 24%),
        linear-gradient(180deg, #fff7f1, #eef7ff);
      color: #2d211c;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 18px 60px;
    }
    .panel {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(145,110,92,0.25);
      border-radius: 28px;
      padding: 24px;
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 40px;
    }
    p {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.6;
      color: #7f5648;
    }
    .links {
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 18px 20px;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(145,110,92,0.25);
      font-size: 22px;
      font-weight: 700;
    }
    a:hover {
      background: rgba(255,255,255,0.95);
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Theo dõi thêm các trang học ngoại ngữ</h1>
      <p>Học thêm ngoại ngữ cùng Taeheon qua các trang dưới đây.</p>
      <div class="links">
        <a href="https://www.facebook.com/profile.php?id=61586235293439" target="_blank" rel="noopener noreferrer">Trang tiếng Nhật</a>
        <a href="https://www.facebook.com/profile.php?id=61586607184818" target="_blank" rel="noopener noreferrer">Trang tiếng Anh</a>
        <a href="https://www.facebook.com/profile.php?id=61588604086377" target="_blank" rel="noopener noreferrer">Trang tiếng Hàn</a>
      </div>
    </section>
  </main>
</body>
</html>
