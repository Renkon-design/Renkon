<html lang="vi">
<head>
  <meta charset="utf-8">

  <meta name="description" content="Đáp án và lời giải JLPT">
  <meta property="og:type" content="article">
  <meta property="og:title" content="JLPT Giai thich">
  <meta property="og:description" content="Đáp án đúng vì &quot;～うえに&quot; mang nghĩa &quot;không những... mà còn&quot; diễn tả sự thêm vào. Các đáp án còn lại sai vì diễn tả sự đối lập, thay thế hoặc làm theo.">
  <meta property="og:image" content="https://taeheon.pages.dev/assets/answers/undated_r183_answer.png">
  <meta property="og:url" content="https://taeheon.pages.dev/jp/jp-r183">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6503576558706568"
       crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-a: #fdf5ef;
      --bg-b: #eff7ff;
      --ink: #2d211c;
      --soft: rgba(255,255,255,0.88);
      --line: rgba(145,110,92,0.35);
      --accent: #8f6254;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Arial", "Yu Gothic", "Meiryo", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #ffe8f2 0, transparent 26%),
        radial-gradient(circle at top right, #fff0d2 0, transparent 24%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 18px 60px;
    }
    .panel {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
    }
    .hero {
      margin-bottom: 18px;
      text-align: center;
    }
    .hero img {
      width: 100%;
      border-radius: 24px;
      display: block;
    }
    .answer {
      margin: 0 0 12px;
      font-size: 36px;
      font-weight: 900;
      color: #1f1714;
    }
    .explain {
      font-size: 26px;
      line-height: 1.65;
    }
    .ad {
      margin: 0 0 18px;
      padding: 18px;
      border: 1px dashed rgba(143,98,84,0.35);
      border-radius: 20px;
      text-align: center;
      color: #7a6a62;
      background: rgba(255,255,255,0.55);
      font-size: 16px;
    }
    .promo {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }
    .promo-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }
    .promo-links {
      display: grid;
      gap: 10px;
    }
    .promo-links a {
      display: block;
      padding: 14px 16px;
      border-radius: 16px;
      text-decoration: none;
      color: #2d211c;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(145,110,92,0.25);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero panel">
      <img src="/assets/answers/undated_r183_answer.png" alt="Đáp án và lời giải">
    </section>
    <section class="panel">
      <div class="ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-6503576558706568"
             data-ad-slot="6684276773"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
      <div class="answer">Đáp án: 2</div>
      <div class="explain">Đáp án đúng vì &quot;～うえに&quot; mang nghĩa &quot;không những... mà còn&quot; diễn tả sự thêm vào. Các đáp án còn lại sai vì diễn tả sự đối lập, thay thế hoặc làm theo.</div>
      <div class="promo">
        <div class="promo-title">Theo dõi thêm các trang học ngoại ngữ</div>
        <div class="promo-links">
          <a href="https://www.facebook.com/profile.php?id=61586235293439" target="_blank" rel="noopener noreferrer">Trang tiếng Nhật</a>
          <a href="https://www.facebook.com/profile.php?id=61586607184818" target="_blank" rel="noopener noreferrer">Trang tiếng Anh</a>
          <a href="https://www.facebook.com/profile.php?id=61588604086377" target="_blank" rel="noopener noreferrer">Trang tiếng Hàn</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
